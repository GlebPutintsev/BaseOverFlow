services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: baseoverflow-backend:1.0.0
    container_name: baseoverflow-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/baseoverflow.db
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - DEBUG=${DEBUG:-false}
      - QDRANT_PATH=/app/data/qdrant
    volumes:
      - backend_data:/app/data
    networks:
      - baseoverflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    image: baseoverflow-frontend:1.0.0
    container_name: baseoverflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - baseoverflow-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  baseoverflow-network:
    driver: bridge

volumes:
  backend_data:
    driver: local
